services:
  - type: web
    name: sfucourses-web
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      apt-get update && apt-get install -y wkhtmltopdf && pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT src.app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sfucourses-db
          property: connectionString
      - key: PDFKIT_PATH
        value: /usr/bin/wkhtmltopdf
    # Attach the same DB to the render service (see below)

  - type: web
    name: sfucourses-render
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      apt-get update && apt-get install -y wkhtmltopdf && pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT src.render_service:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sfucourses-db
          property: connectionString
      - key: PDFKIT_PATH
        value: /usr/bin/wkhtmltopdf

databases:
  - name: sfucourses-db
    plan: free
    region: oregon
    postgresVersion: "14"
