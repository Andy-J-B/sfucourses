name: Vitest Tests
on:
  push:
    branches: [main, andy/scheduler]
  pull_request:
    branches: [main, andy/scheduler]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm run test
